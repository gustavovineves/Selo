version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: selo_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-selo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-selopassword}
      POSTGRES_DB: ${POSTGRES_DB:-selodb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-selo} -d ${POSTGRES_DB:-selodb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
